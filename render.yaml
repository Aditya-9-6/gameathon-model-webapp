services:
  # 1. Rust Backend Web Service (Free Tier)
  - type: web
    name: ironwall-backend
    runtime: rust
    plan: free
    buildCommand: cd backend && cargo build --release
    startCommand: ./backend/target/release/ironwall-gamethon
    envVars:
      - key: PORT
        value: 9001
      - key: RUST_LOG
        value: info

  # 2. Static Frontend Site (Free)
  - type: static_site
    name: ironwall-frontend
    plan: free
    staticPublishPath: ./frontend
    envVars:
      - key: BACKEND_URL
        value: https://ironwall-backend.onrender.com
