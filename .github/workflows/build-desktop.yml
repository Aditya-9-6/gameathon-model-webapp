name: Build Windows/Mac Desktop App

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create Electron App
        shell: cmd
        run: |
          mkdir electron_app
          cd electron_app
          npm init -y
          npm install electron electron-builder rimraf
          
          # Copy frontend files
          mkdir app
          xcopy "..\frontend\*" "app\" /E /I
          
          # Rename demo.html to index.html for the desktop app entry point
          ren "app\index.html" "defense_board.html"
          ren "app\demo.html" "index.html"
          
          # Create main.js
          echo const { app, BrowserWindow } = require('electron') > main.js
          echo const path = require('path') >> main.js
          echo function createWindow () { >> main.js
          echo   const win = new BrowserWindow({ >> main.js
          echo     width: 1920, >> main.js
          echo     height: 1080, >> main.js
          echo     fullscreen: true, >> main.js
          echo     autoHideMenuBar: true, >> main.js
          echo     webPreferences: { nodeIntegration: true } >> main.js
          echo   }) >> main.js
          echo   win.loadFile('app/index.html') >> main.js
          echo } >> main.js
          echo app.whenReady().then(createWindow) >> main.js
          
          # Update package.json
          npm pkg set main="main.js"
          npm pkg set scripts.build="electron-builder --win --x64"
          npm pkg set build.appId="com.ironwall.desktop"
          npm pkg set build.productName="IronWall Plus Demo"
          npm pkg set build.directories.output="dist"

      - name: Build Windows .EXE
        shell: cmd
        run: |
          cd electron_app
          npm run build

      - name: Commit and Push EXE
        shell: cmd
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch
          git pull
          
          # Remove any previous EXEs to avoid duplicates if name changes
          del public_site\*.exe 2>nul || echo "None to delete"
          del frontend\*.exe 2>nul || echo "None to delete"
          
          copy "electron_app\dist\*.exe" "public_site\ironwall-gamethon-desktop.exe"
          copy "electron_app\dist\*.exe" "frontend\ironwall-gamethon-desktop.exe"
          
          git add public_site/ironwall-gamethon-desktop.exe frontend/ironwall-gamethon-desktop.exe
          git commit -m "Auto-generated real Windows Desktop App via GitHub Actions 🤖💻" || echo "No changes to commit"
          git push
