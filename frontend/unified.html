<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRONWALL+ | UNIFIED COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f5ff;
            --neon-red: #ff1744;
            --bg-deep: #030308;
            --panel-bg: #0a0a12;
            --border-glow: rgba(0, 245, 255, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-deep);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
        }

        /* Top Header Bar */
        .command-header {
            height: 50px;
            background: #000;
            border-bottom: 2px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.2);
            z-index: 100;
        }

        .header-logo {
            font-weight: 900;
            letter-spacing: 3px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            font-size: 1.2rem;
        }

        .header-status {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            color: var(--neon-cyan);
            display: flex;
            align-items: center;
        }

        .header-status span {
            margin-left: 15px;
            opacity: 0.8;
        }

        .blink {
            animation: blinker 1s linear infinite;
        }

        @keyframes blinker {
            50% {
                opacity: 0;
            }
        }

        /* Main Workspace */
        .workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Viewport Containers */
        .viewport {
            position: relative;
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        #defense-viewport {
            flex: 1.2;
            border-right: 2px solid var(--neon-cyan);
        }

        #attack-viewport {
            flex: 0.8;
            border-left: 1px solid rgba(255, 23, 68, 0.2);
        }

        /* Viewport Headers */
        .viewport-title {
            height: 30px;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .defense-title {
            color: var(--neon-cyan);
        }

        .attack-title {
            color: var(--neon-red);
        }

        /* Iframes */
        iframe {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        /* Overlay CRT Effect */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.15;
        }

        /* Controls */
        .floating-controls {
            display: flex;
            gap: 10px;
            margin-right: 20px;
        }

        .control-btn {
            background: rgba(0, 245, 255, 0.05);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 4px 12px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
        }

        .control-btn:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .control-btn.active {
            background: var(--neon-cyan);
            color: #000;
        }

        /* Responsiveness: Handle narrow screens */
        @media (max-width: 1200px) {
            .workspace {
                flex-direction: column;
            }

            #defense-viewport,
            #attack-viewport {
                border: none;
                flex: 1;
            }

            #defense-viewport {
                border-bottom: 2px solid var(--neon-cyan);
            }
        }
    </style>
</head>

<body>
    <div class="crt-overlay"></div>

    <header class="command-header">
        <div class="header-logo">IRONWALL+ <span style="font-size: 0.7rem; opacity: 0.6;">UNIFIED COMMAND CENTER</span>
        </div>
        <div class="header-status">
            <div id="lobby-code-badge" style="color:#bf5fff; border-right: 1px solid rgba(191,95,255,0.3); padding-right:12px; margin-right:12px; display:none; align-items:center; gap:8px;">
                <span style="opacity:0.6; font-size:0.7rem; font-family: 'Share Tech Mono', monospace;">LOBBY:</span>
                <span id="lobby-code-val" style="font-weight:900; letter-spacing:2px; font-size:0.9rem;">----</span>
            </div>
            <div class="floating-controls">
                <button class="control-btn" onclick="setView('defense')">Defense Focus</button>
                <button class="control-btn active" onclick="setView('split')">Split Screen</button>
                <button class="control-btn" onclick="setView('attack')">Attack Focus</button>
            </div>
            <span class="blink">● SYSTEM ONLINE</span>
            <span>OS: TITAN-KERNEL v4.0</span>
            <span id="timer">00:00:00</span>
        </div>
    </header>

    <main class="workspace">
        <section id="defense-viewport" class="viewport">
            <div class="viewport-title defense-title">// DEFENSE GRID OPERATIONS</div>
            <iframe id="defense-frame" src="index.html"></iframe>
        </section>

        <section id="attack-viewport" class="viewport">
            <div class="viewport-title attack-title">// RED TEAM OFFENSE TERMINAL</div>
            <iframe id="attack-frame" src="attacker.html"></iframe>
        </section>
    </main>


    <script>
        // Set focus mode
        function setView(mode) {
            const def = document.getElementById('defense-viewport');
            const atk = document.getElementById('attack-viewport');
            const btns = document.querySelectorAll('.control-btn');

            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            if (mode === 'defense') {
                def.style.flex = "1";
                atk.style.flex = "0";
                atk.style.opacity = "0";
            } else if (mode === 'attack') {
                def.style.flex = "0";
                def.style.opacity = "0";
                atk.style.flex = "1";
                atk.style.opacity = "1";
            } else {
                def.style.flex = "1.2";
                def.style.opacity = "1";
                atk.style.flex = "0.8";
                atk.style.opacity = "1";
            }
        }

        // Timer
        setInterval(() => {
            const now = new Date();
            document.getElementById('timer').textContent = now.toLocaleTimeString();
        }, 1000);

        // Sync audio
        window.addEventListener('mousedown', () => {
            const def = document.getElementById('defense-frame').contentWindow;
            const atk = document.getElementById('attack-frame').contentWindow;
            if (def.audio) def.audio.init();
            if (atk.audio) atk.audio.init();
        }, { once: true });

        // Auto-activate LLM in Unified (Mix) mode
        window.addEventListener('load', () => {
            const defFrame = document.getElementById('defense-frame');
            defFrame.addEventListener('load', () => {
                const defDoc = defFrame.contentDocument || defFrame.contentWindow.document;
                const aiBtn = defDoc.getElementById('ai-chat-toggle-btn');
                if (aiBtn) {
                    console.log("[Unified] Auto-activating AI Consultant panel...");
                    aiBtn.click();
                }
            });
        });
        // Lobby Code Detection
        async function fetchLobbyCode() {
            try {
                const res = await fetch('/api/lobby-code');
                const data = await res.json();
                const badge = document.getElementById('lobby-code-badge');
                const val = document.getElementById('lobby-code-val');
                if (badge && val && data.code) {
                    val.textContent = data.code;
                    badge.style.display = 'flex';
                }
            } catch (e) {
                console.warn('Lobby code not available');
            }
        }
        fetchLobbyCode();

        // Listen for navigation messages from children (Defense HUD buttons)
        window.addEventListener('message', (event) => {
            if (event.data.type === 'SET_VIEW') {
                setView(event.data.mode);
            }
        });
    </script>
</body>

</html>
