<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRONWALL+ | LAUNCHER</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #030308;
            color: #00f5ff;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        .container {
            text-align: center;
            padding: 2rem;
            border: 1px solid rgba(0, 245, 255, 0.2);
            background: rgba(0, 245, 255, 0.02);
            box-shadow: 0 0 50px rgba(0, 245, 255, 0.1);
            max-width: 400px;
            width: 80%;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 0.5rem;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px #00f5ff;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .launch-btn {
            background: transparent;
            border: 1px solid #00f5ff;
            color: #00f5ff;
            padding: 1.2rem;
            font-family: inherit;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
        }

        .launch-btn:hover {
            background: rgba(0, 245, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        .btn-attack {
            border-color: #ff1744;
            color: #ff1744;
        }

        .btn-attack:hover {
            background: rgba(255, 23, 68, 0.1);
            box-shadow: 0 0 20px rgba(255, 23, 68, 0.3);
        }

        .status {
            margin-top: 2rem;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* CRT Scanline Effect */
        body::after {
            content: " ";
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>IRONWALL+</h1>
        <div class="btn-group">
            <a href="index.html" class="launch-btn">DEFENSE CORE <br><small
                    style="font-size: 0.6rem; opacity: 0.7;">Monitor Terminal</small></a>
            <a href="attacker.html" class="launch-btn btn-attack">ATTACK TERMINAL <br><small
                    style="font-size: 0.6rem; opacity: 0.7;">Red Team Controller</small></a>
            <a href="demo.html" class="launch-btn" style="border-color: #39ff14; color: #39ff14;">MASTER DEMO MODE
                <br><small style="font-size: 0.6rem; opacity: 0.7;">Split-Screen (Projector Mode)</small></a>
        </div>
        <div class="status">System Ready — v3.0.0-PROD</div>
    </div>

    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW Registered', reg))
                .catch(err => console.error('SW Failed', err));
        }
    </script>
</body>

</html>
